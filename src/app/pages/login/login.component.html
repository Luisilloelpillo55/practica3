<div class="page-frame">
  <header class="page-header">
    <h3>Iniciar sesión</h3>
    <a routerLink="/home" class="p-button p-button-text">Inicio</a>
  </header>

  <section class="page-body">
    <form [formGroup]="form" (ngSubmit)="login()" class="p-fluid form">
      <div class="p-field">
        <label>Usuario</label>
        <input pInputText formControlName="username" />
        <small *ngIf="form.controls.username.invalid && form.controls.username.touched">Requerido</small>
      </div>

      <div class="p-field">
        <label>Contraseña</label>
        <input [type]="showPassword ? 'text' : 'password'" pInputText formControlName="password" />
        <small *ngIf="form.controls.password.invalid && form.controls.password.touched">Requerido</small>
      </div>

      <div class="actions">
        <button pButton type="submit" label="Entrar" [disabled]="form.invalid"></button>
        <a routerLink="/register" class="p-button p-button-text">Crear cuenta</a>
      </div>
    </form>
  </section>

  <p-toast></p-toast>
  <footer class="page-footer">Practica con PrimeNG</footer>
</div>
<div class="page-frame">
  <header class="page-header">
    <h3>Login</h3>
    <a routerLink="/home" class="p-button p-button-text">Inicio</a>
  </header>

  <section class="page-body">
    <div class="p-fluid form">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="p-field">
          <label for="username">Usuario</label>
          <input id="username" pInputText formControlName="username" />
        </div>

        <div class="p-field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" pInputText formControlName="password" />
        </div>

        <button pButton type="submit" label="Entrar" [disabled]="form.invalid"></button>
      </form>
    </div>
  </section>

  <footer class="page-footer">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></footer>
  <p-toast></p-toast>
</div>
