<div class="page-frame">
  <header class="page-header">
    <h3>Login</h3>
    <button pButton type="button" class="purple-btn" (click)="goBack()">Inicio</button>
  </header>

  <section class="page-body">
    <div class="p-fluid form">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="p-field">
          <label for="username">Usuario</label>
          <div class="p-inputgroup input-styled">
            <span class="p-inputgroup-addon"><i class="pi pi-user"></i></span>
            <input id="username" pInputText formControlName="username" />
          </div>
        </div>

        <div class="p-field">
          <label for="password">Contraseña</label>
          <div class="p-inputgroup input-styled">
            <input id="password" [type]="showPassword ? 'text' : 'password'" pInputText formControlName="password" />
            <button pButton type="button" class="p-button-text" (click)="togglePassword()" [icon]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></button>
          </div>
        </div>

        <button pButton type="submit" label="Entrar" class="purple-submit" [disabled]="form.invalid"></button>
      </form>
    </div>
  </section>

  <footer class="page-footer">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></footer>
  <p-toast></p-toast>
</div>
