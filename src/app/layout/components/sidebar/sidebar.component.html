<aside class="sidebar" [class.open]="visible">
  <div class="sidebar-header">
    <strong>Menú</strong>
    <button type="button" class="close-btn" (click)="closeSidebar()">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <button 
      *ngFor="let item of items" 
      class="nav-item" 
      [routerLink]="item.routerLink"
      [routerLinkActive]="item.routerLink ? 'active' : ''"
      (click)="item.command ? item.command() : onLink()"
    >
      <i [class]="item.icon"></i>
      {{ item.label }}
    </button>
  </nav>
</aside>
