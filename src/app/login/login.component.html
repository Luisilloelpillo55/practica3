<div class="page-frame">
  <header class="page-header">
    <h3>Login</h3>
    <a routerLink="/home" class="p-button p-button-text">Inicio</a>
  </header>

  <section class="page-body">
    <div class="p-fluid form">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="p-field">
          <label for="username">Usuario</label>
          <input id="username" pInputText formControlName="username" />
        </div>

        <div class="p-field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" pInputText formControlName="password" />
        </div>

        <button pButton type="submit" label="Entrar" [disabled]="form.invalid"></button>
      </form>
    </div>
  </section>

  <footer class="page-footer">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></footer>
  <p-toast></p-toast>
</div>
